<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframe angepasst</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: black;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 50%;
      height: 100vh;
      width: calc(100vw / 0.92);
      border: none;
      display: block;
      transform: translateX(-50%) scaleX(0.92);
      transform-origin: center top;
    }
  </style>
</head>
<body>
  <div class="stage">
    <iframe
      src="https://mensa.woses.de"
      title="Eingebettete Webseite">
    </iframe>
  </div>
</body>
</html>
