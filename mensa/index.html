<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensa Iframe</title>
  <style>
    :root {
      --side-margin: 140px;
      --bg: rgba(59,130,246,0.15);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      zoom: 1.2;
    }

    iframe {
      display: block;
      border: none;
      height: 100vh;
      width: calc(100vw - (2 * var(--side-margin)));
      margin-left: var(--side-margin);
      margin-right: var(--side-margin);
      background: transparent;
    }
  </style>
</head>
<body>
  <iframe
    src="https://mensa.woses.de"
    title="Mensa">
  </iframe>
</body>
</html>
