<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensa Iframe</title>
  <style>
    :root {
      --side-margin: 140px;
      --bg: rgba(59,130,246,0.15);
      --zoom: 1.6;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    .viewport {
      position: fixed;
      top: 0;
      left: var(--side-margin);
      right: var(--side-margin);
      bottom: 0;
      overflow: hidden;
      background: var(--bg);
    }

    iframe {
      border: none;
      display: block;
      width: calc(100% / var(--zoom));
      height: calc(100% / var(--zoom));
      transform: scale(var(--zoom));
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <iframe src="https://mensa.woses.de" title="Mensa"></iframe>
  </div>
</body>
</html>
