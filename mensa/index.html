<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframe Vollbild</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .iframe-wrap {
      position: fixed;
      top: -20px;
      left: -80px;
      width: calc(100vw + 160px);
      height: calc(100vh + 40px);
      overflow: hidden;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-wrap">
    <iframe
      src="https://mensa.woses.de"
      title="Eingebettete Webseite">
    </iframe>
  </div>
</body>
</html>
